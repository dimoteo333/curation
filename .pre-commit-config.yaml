repos:
  - repo: local
    hooks:
      - id: flutter-pub-get
        name: flutter-pub-get
        entry: bash -lc 'cd mobile && flutter pub get'
        language: system
        pass_filenames: false
        always_run: true

      - id: flutter-analyze
        name: flutter-analyze
        entry: bash -lc 'cd mobile && flutter analyze'
        language: system
        pass_filenames: false
        always_run: true

      - id: flutter-test
        name: flutter-test
        entry: bash -lc 'cd mobile && flutter test'
        language: system
        pass_filenames: false
        always_run: true

      - id: backend-ruff
        name: backend-ruff
        entry: python3 -m ruff check backend/app backend/tests
        language: system
        pass_filenames: false
        always_run: true

      - id: backend-mypy
        name: backend-mypy
        entry: python3 -m mypy backend/app
        language: system
        pass_filenames: false
        always_run: true

      - id: backend-pytest
        name: backend-pytest
        entry: python3 -m pytest backend/tests -q
        language: system
        pass_filenames: false
        always_run: true

      - id: openapi-drift
        name: openapi-drift
        entry: bash scripts/check-openapi-drift.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: docs-validate
        name: docs-validate
        entry: bash scripts/validate-docs.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: seed-source-consistency
        name: seed-source-consistency
        entry: python3 scripts/check_seed_source_consistency.py
        language: system
        pass_filenames: false
        always_run: true

      - id: native-dependency-pins
        name: native-dependency-pins
        entry: bash scripts/check-native-dependency-pins.sh --strict
        language: system
        pass_filenames: false
        always_run: true

      - id: release-signing-guard
        name: release-signing-guard
        entry: bash scripts/check-release-signing.sh
        language: system
        pass_filenames: false
        always_run: true
