name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff mypy
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get
      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze
      - name: Ruff
        run: python -m ruff check backend/app backend/tests
      - name: Mypy
        run: python -m mypy backend/app

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get
      - name: Flutter test
        working-directory: mobile
        run: flutter test
      - name: Pytest
        run: python -m pytest backend/tests -q

  android-release:
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      CURATOR_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      CURATOR_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      CURATOR_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Decode Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "ANDROID_RELEASE_KEYSTORE_BASE64 secret is required for Android release builds."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/android"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android/release.keystore"
          echo "CURATOR_RELEASE_STORE_FILE=$RUNNER_TEMP/android/release.keystore" >> "$GITHUB_ENV"
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get
      - name: Build Android release APK
        working-directory: mobile
        run: flutter build apk --release
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  ios-archive:
    runs-on: macos-15
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get
      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install
      - name: Prepare unsigned iOS build
        working-directory: mobile
        run: flutter build ios --release --no-codesign
      - name: Archive iOS app without signing
        working-directory: mobile
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned archive
        working-directory: mobile
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/archive/Runner.xcarchive build/ios/archive/Runner.xcarchive.zip
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-archive
          path: mobile/build/ios/archive/Runner.xcarchive.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [lint, test, android-release, ios-archive]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: dist/android
      - uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-archive
          path: dist/ios
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/android/app-release.apk
            dist/ios/Runner.xcarchive.zip
          generate_release_notes: true
