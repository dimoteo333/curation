name: ios-simulator

on:
  pull_request:
    branches: [main, develop]

jobs:
  ios-e2e:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Flutter deps
        working-directory: mobile
        run: flutter pub get

      - name: Boot iOS Simulator
        uses: futureware-tech/simulator-action@v4
        with:
          model: "iPhone 16"
          os_version: "18.2"

      - name: Start FastAPI in background
        run: |
          bash scripts/run-api.sh > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 8

      - name: Run Flutter integration tests
        env:
          API_BASE_URL: http://127.0.0.1:8000
        run: bash scripts/run-ios-sim-tests.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-sim-artifacts
          path: |
            backend.log
            mobile/test_artifacts/**
            mobile/integration_test/screenshots/**

      - name: Stop backend
        if: always()
        run: |
          kill $(cat backend.pid) || true
